<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Network Visualizer</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Network Visualizer</h1>
        <p id="status-line">collecting local network state...</p>
      </div>
      <div class="actions">
        <button id="refresh" type="button">Refresh now</button>
        <label class="toggle"><input id="auto" type="checkbox" checked /> 自動更新 30s</label>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="snapshot">
        <article><span>Global IP</span><strong id="public-ip">-</strong></article>
        <article><span>ISP / ASN</span><strong id="isp">-</strong></article>
        <article><span>Wi-Fi</span><strong id="wifi-now">-</strong></article>
        <article><span>Gateway RTT</span><strong id="gw-rtt">-</strong></article>
        <article><span>Quality</span><strong id="quality-now">-</strong></article>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Wi-Fi 信号</h2>
          <span>RSSI / SNR, 過去 1h</span>
        </div>
        <canvas id="wifi-chart"></canvas>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>経路ツリー</h2>
          <span>自機 → ルータ → インターネット</span>
        </div>
        <div id="trace-tree"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>世界地図</h2>
          <span>traceroute hop locations</span>
        </div>
        <div id="map"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>品質履歴</h2>
          <span>ping / throughput, 過去 24h</span>
        </div>
        <canvas id="quality-chart"></canvas>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
